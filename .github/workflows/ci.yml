name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SYSTEM/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: SYSTEM/dashboard

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Create workspace structure
        run: |
          mkdir -p WORKSPACES/default/AGENTS
          mkdir -p WORKSPACES/default/WORKFLOWS
          mkdir -p WORKSPACES/default/ORG
          mkdir -p WORKSPACES/default/TEMPLATES
          mkdir -p WORKSPACES/default/SKILLS/custom

      - name: Create minimal OpenClaw config
        run: |
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/openclaw.json << 'EOF'
          {
            "agents": { "list": [] },
            "meta": { "version": "0.3.0", "lastTouchedAt": "2026-01-01T00:00:00.000Z" }
          }
          EOF

      - name: Start dashboard server
        run: |
          export OPENCLAW_WORKSPACE="$GITHUB_WORKSPACE/WORKSPACES/default"
          cd SYSTEM/dashboard
          npx ts-node server/index.ts &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done

      - name: Run tests
        run: ./SYSTEM/test.sh
