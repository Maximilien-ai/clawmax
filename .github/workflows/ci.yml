name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENCLAW_WORKSPACE: ${{ github.workspace }}/WORKSPACES/default
      OPENCLAW_SKILLS_DIR: /tmp/openclaw/skills
      AUTH_MODE: bypass
      DASHBOARD_AUTH_DISABLED: "true"
      DASHBOARD_PORT: "3001"
      CORS_ORIGIN: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SYSTEM/dashboard/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install OpenClaw CLI
        run: |
          git clone https://github.com/openclaw/openclaw.git /tmp/openclaw
          cd /tmp/openclaw
          # Pin to a known-good commit to avoid upstream breakage
          git checkout v0.2.16 2>/dev/null || true
          go build -o /usr/local/bin/openclaw . 2>/dev/null || {
            echo "::warning::OpenClaw CLI build failed — creating stub for CI"
            echo '#!/bin/sh' > /usr/local/bin/openclaw
            echo 'echo "openclaw stub for CI"' >> /usr/local/bin/openclaw
            chmod +x /usr/local/bin/openclaw
          }

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run setup
        run: ./setup.sh < /dev/null

      - name: Prepare dashboard env
        run: |
          cat > SYSTEM/dashboard/.env <<EOF
          OPENCLAW_WORKSPACE=${OPENCLAW_WORKSPACE}
          OPENCLAW_SKILLS_DIR=${OPENCLAW_SKILLS_DIR}
          DASHBOARD_AUTH_DISABLED=${DASHBOARD_AUTH_DISABLED}
          DASHBOARD_PORT=${DASHBOARD_PORT}
          CORS_ORIGIN=${CORS_ORIGIN}
          NODE_ENV=test
          EOF

      - name: Start dashboard server
        run: |
          cd SYSTEM/dashboard
          npx ts-node server/index.ts > /tmp/clawmax-ci-dashboard.log 2>&1 &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/api/health > /dev/null 2>&1 || {
            echo "::error::Dashboard server failed to start"
            cat /tmp/clawmax-ci-dashboard.log
            exit 1
          }

      - name: Run tests
        env:
          SKIP_CI_QUARANTINED_TESTS: "true"
        run: ./SYSTEM/test.sh

      - name: Run quarantined Templates API suite
        continue-on-error: true
        run: |
          cd SYSTEM/dashboard
          npx ts-node --transpileOnly server/lib/templates.test.ts

      - name: Run quarantined Docker entrypoint suite
        continue-on-error: true
        run: sh SYSTEM/dashboard/docker-entrypoint.test.sh
