name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENCLAW_WORKSPACE: ${{ github.workspace }}/WORKSPACES/default
      AUTH_MODE: bypass
      DASHBOARD_AUTH_DISABLED: "true"
      DASHBOARD_PORT: "3001"
      CORS_ORIGIN: http://localhost:5173
      CLAWMAX_OPENCLAW_TARGET: v2026.5.26

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
          cache-dependency-path: SYSTEM/dashboard/package-lock.json

      - name: Install OpenClaw CLI
        run: |
          chmod +x ./SYSTEM/prepare-openclaw-target.sh
          openclaw_bin="$(./SYSTEM/prepare-openclaw-target.sh --print-bin)"
          openclaw_skills_dir="$(./SYSTEM/prepare-openclaw-target.sh --print-skills-dir)"
          echo "OPENCLAW_BIN=${openclaw_bin}" >> "$GITHUB_ENV"
          echo "OPENCLAW_SKILLS_DIR=${openclaw_skills_dir}" >> "$GITHUB_ENV"
          echo "$(dirname "$openclaw_bin")" >> "$GITHUB_PATH"
          "$openclaw_bin" --version

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run setup
        run: ./setup.sh < /dev/null

      - name: Prepare dashboard env
        run: |
          cat > SYSTEM/dashboard/.env <<EOF
          OPENCLAW_WORKSPACE=${OPENCLAW_WORKSPACE}
          OPENCLAW_SKILLS_DIR=${OPENCLAW_SKILLS_DIR}
          DASHBOARD_AUTH_DISABLED=${DASHBOARD_AUTH_DISABLED}
          DASHBOARD_PORT=${DASHBOARD_PORT}
          CORS_ORIGIN=${CORS_ORIGIN}
          NODE_ENV=test
          EOF

      - name: Start dashboard server
        run: |
          cd SYSTEM/dashboard
          npx ts-node server/index.ts > /tmp/clawmax-ci-dashboard.log 2>&1 &
          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
          curl -sf http://localhost:3001/api/health > /dev/null 2>&1 || {
            echo "::error::Dashboard server failed to start"
            cat /tmp/clawmax-ci-dashboard.log
            exit 1
          }

      - name: Run tests
        run: ./SYSTEM/test.sh
