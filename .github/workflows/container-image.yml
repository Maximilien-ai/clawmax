name: Container Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref to build, usually a release tag like v1.5.8
        required: true
        default: v1.5.8
      publish_latest:
        description: Also publish the latest tag
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/maximilien-ai/clawmax-dashboard

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch_tag: amd64
          - platform: linux/arm64
            arch_tag: arm64
    outputs:
      version: ${{ steps.vars.outputs.version }}
      semver: ${{ steps.vars.outputs.semver }}
      publish_latest: ${{ steps.vars.outputs.publish_latest }}
    steps:
      - name: Resolve build ref and tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            ref_input="${{ inputs.release_ref }}"
            publish_latest="${{ inputs.publish_latest }}"
          else
            ref_input="${GITHUB_REF_NAME}"
            publish_latest="true"
          fi

          version="${ref_input}"
          version="${version#refs/tags/}"
          version="${version#refs/heads/}"
          semver="${version#v}"

          {
            echo "ref=${ref_input}"
            echo "version=${version}"
            echo "semver=${semver}"
            echo "publish_latest=${publish_latest}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build tag list
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          tags="$(printf '%s\n%s\n%s' \
            "${IMAGE_NAME}:${{ steps.vars.outputs.version }}-${{ matrix.arch_tag }}" \
            "${IMAGE_NAME}:${{ steps.vars.outputs.semver }}-${{ matrix.arch_tag }}" \
            "${IMAGE_NAME}:sha-${GITHUB_SHA::12}-${{ matrix.arch_tag }}")"

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            CLAWMAX_VERSION=${{ steps.vars.outputs.version }}
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ClawMax Dashboard
            org.opencontainers.image.description=ClawMax dashboard runtime with bundled OpenClaw
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}

      - name: Verify packaged dashboard version in image
        shell: bash
        run: |
          set -euo pipefail

          image="${IMAGE_NAME}:${{ steps.vars.outputs.version }}-${{ matrix.arch_tag }}"
          expected="${{ steps.vars.outputs.semver }}"
          expected_env="${{ steps.vars.outputs.version }}"

          actual_version="$(docker run --rm \
            --platform "${{ matrix.platform }}" \
            --entrypoint /bin/sh \
            "${image}" \
            -lc "node -p \"require('/app/SYSTEM/dashboard/package.json').version\"")"

          actual_env="$(docker run --rm \
            --platform "${{ matrix.platform }}" \
            --entrypoint /bin/sh \
            "${image}" \
            -lc "printf '%s' \"\$CLAWMAX_VERSION\"")"

          if [ "${actual_version}" != "${expected}" ]; then
            echo "Packaged dashboard version mismatch: expected ${expected}, got ${actual_version}" >&2
            exit 1
          fi

          if [ "${actual_env}" != "${expected_env}" ]; then
            echo "CLAWMAX_VERSION mismatch: expected ${expected_env}, got ${actual_env}" >&2
            exit 1
          fi

  publish-manifest:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Resolve manifest tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          tags="$(printf '%s\n%s\n%s' \
            "${IMAGE_NAME}:${{ needs.build.outputs.version }}" \
            "${IMAGE_NAME}:${{ needs.build.outputs.semver }}" \
            "${IMAGE_NAME}:sha-${GITHUB_SHA::12}")"

          if [ "${{ needs.build.outputs.publish_latest }}" = "true" ]; then
            tags="${tags}"$'\n'"${IMAGE_NAME}:latest"
          fi

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list tags
        shell: bash
        run: |
          set -euo pipefail

          semver="${{ needs.build.outputs.semver }}"
          version="${{ needs.build.outputs.version }}"
          sha_tag="sha-${GITHUB_SHA::12}"

          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            suffix="${tag##*:}"
            case "$suffix" in
              "$version")
                source_a="${IMAGE_NAME}:${version}-amd64"
                source_b="${IMAGE_NAME}:${version}-arm64"
                ;;
              "$semver")
                source_a="${IMAGE_NAME}:${semver}-amd64"
                source_b="${IMAGE_NAME}:${semver}-arm64"
                ;;
              "$sha_tag")
                source_a="${IMAGE_NAME}:${sha_tag}-amd64"
                source_b="${IMAGE_NAME}:${sha_tag}-arm64"
                ;;
              latest)
                source_a="${IMAGE_NAME}:${semver}-amd64"
                source_b="${IMAGE_NAME}:${semver}-arm64"
                ;;
              *)
                echo "Unknown manifest target: $tag" >&2
                exit 1
                ;;
            esac
            docker buildx imagetools create -t "$tag" "$source_a" "$source_b"
          done <<< "${{ steps.tags.outputs.tags }}"
