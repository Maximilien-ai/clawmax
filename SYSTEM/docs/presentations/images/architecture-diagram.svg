<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .box-header { fill: #3b82f6; }
      .title { fill: #ffffff; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .item { fill: #1e293b; font-family: Arial, sans-serif; font-size: 14px; }
      .arrow { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .gradient-box { fill: url(#gradient); stroke: #2563eb; stroke-width: 2; rx: 8; }
    </style>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>

  <!-- ClawMax Dashboard -->
  <g id="dashboard">
    <rect class="gradient-box" x="100" y="20" width="400" height="140" />
    <rect class="box-header" x="100" y="20" width="400" height="40" rx="8" />
    <text class="title" x="300" y="47" text-anchor="middle">ClawMax Dashboard (React)</text>
    <text class="item" x="120" y="80">• Multi-agent management UI</text>
    <text class="item" x="120" y="105">• Visual workflow editor</text>
    <text class="item" x="120" y="130">• Template library</text>
    <text class="item" x="120" y="155">• Real-time status tracking</text>
  </g>

  <!-- Arrow 1 -->
  <path class="arrow" d="M 300 160 L 300 200" />

  <!-- ClawMax Server -->
  <g id="server">
    <rect class="gradient-box" x="100" y="200" width="400" height="140" />
    <rect class="box-header" x="100" y="200" width="400" height="40" rx="8" />
    <text class="title" x="300" y="227" text-anchor="middle">ClawMax Server (Node.js)</text>
    <text class="item" x="120" y="260">• Workspace API</text>
    <text class="item" x="120" y="285">• Workflow scheduling</text>
    <text class="item" x="120" y="310">• Execution tracking</text>
    <text class="item" x="120" y="335">• Organization management</text>
  </g>

  <!-- Arrow 2 -->
  <path class="arrow" d="M 300 340 L 300 380" />

  <!-- OpenClaw CLI -->
  <g id="cli">
    <rect class="gradient-box" x="100" y="380" width="400" height="140" />
    <rect class="box-header" x="100" y="380" width="400" height="40" rx="8" />
    <text class="title" x="300" y="407" text-anchor="middle">OpenClaw CLI (enhancements)</text>
    <text class="item" x="120" y="440">• openclaw workflow run</text>
    <text class="item" x="120" y="465">• WebSocket communication</text>
    <text class="item" x="120" y="490">• Execution orchestration</text>
    <text class="item" x="120" y="515">• Multi-workspace support</text>
  </g>

  <!-- Arrow 3 -->
  <path class="arrow" d="M 300 520 L 300 560" />

  <!-- OpenClaw Gateway -->
  <g id="gateway">
    <rect class="gradient-box" x="100" y="560" width="400" height="140" />
    <rect class="box-header" x="100" y="560" width="400" height="40" rx="8" />
    <text class="title" x="300" y="587" text-anchor="middle">OpenClaw Gateway (per agent)</text>
    <text class="item" x="120" y="620">• WebSocket RPC server</text>
    <text class="item" x="120" y="645">• chat.send handler</text>
    <text class="item" x="120" y="670">• Agent runtime</text>
    <text class="item" x="120" y="695">• Skills execution</text>
  </g>

  <!-- Legend -->
  <text style="fill: #64748b; font-family: Arial, sans-serif; font-size: 12px; font-style: italic;" x="300" y="740" text-anchor="middle">ClawMax Architecture Stack</text>
  <text style="fill: #94a3b8; font-family: Arial, sans-serif; font-size: 11px;" x="300" y="760" text-anchor="middle">Data flows from Dashboard → Server → CLI → Gateway</text>
</svg>
